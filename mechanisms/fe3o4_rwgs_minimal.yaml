name: fe3o4_rwgs_minimal
version: 0.1.0
description: >
  Machine-readable minimal seven-step RWGS mechanism for Fe3O4.
  This file defines species and elementary steps only. It intentionally does
  not include rate constants, DFT values, experimental values, FeCx-FT steps,
  chain-growth chemistry, or invented literature data.

scope:
  catalyst_phase: Fe3O4
  model_role: RWGS-active phase
  excludes:
    - FeCx-FT reactions
    - C-C coupling
    - chain growth
    - ASF distribution
    - dynamic phase transformation
    - fitted kinetic parameters
    - DFT energies

gas_species:
  - CO2
  - H2
  - CO
  - H2O

surface_species:
  - "*"
  - CO2*
  - H*
  - CO*
  - O*
  - OH*
  - H2O*

reactions:
  - id: R1
    equation: "CO2 + * <=> CO2*"
    type: adsorption_desorption
    reversible: true
    description: "CO2 adsorption on an empty Fe3O4 surface site."

  - id: R2
    equation: "H2 + 2* <=> 2H*"
    type: dissociative_adsorption_recombination
    reversible: true
    description: "Dissociative H2 adsorption to form adsorbed hydrogen."

  - id: R3
    equation: "CO2* + * <=> CO* + O*"
    type: surface_dissociation_recombination
    reversible: true
    description: "Dissociation of adsorbed CO2 into adsorbed CO and adsorbed O."

  - id: R4
    equation: "CO* <=> CO + *"
    type: desorption_adsorption
    reversible: true
    description: "CO desorption from the surface and regeneration of an empty site."

  - id: R5
    equation: "O* + H* <=> OH* + *"
    type: surface_hydrogenation_dehydrogenation
    reversible: true
    description: "Hydrogenation of adsorbed O to form adsorbed OH."

  - id: R6
    equation: "OH* + H* <=> H2O* + *"
    type: surface_hydrogenation_dehydrogenation
    reversible: true
    description: "Hydrogenation of adsorbed OH to form adsorbed H2O."

  - id: R7
    equation: "H2O* <=> H2O + *"
    type: desorption_adsorption
    reversible: true
    description: "H2O desorption from the surface and regeneration of an empty site."
