name: fe3o4_rwgs_minimal
description: >
  Teaching mechanism for a minimal Fe3O4-centered RWGS network.
  Parameters are placeholders until literature-backed values are added.

species:
  gas:
    CO2:
      composition: {C: 1, O: 2}
    H2:
      composition: {H: 2}
    H2O:
      composition: {H: 2, O: 1}
    CO:
      composition: {C: 1, O: 1}
  surface:
    "*":
      composition: {}
      sites: 1
    CO2*:
      composition: {C: 1, O: 2}
      sites: 1
    H*:
      composition: {H: 1}
      sites: 1
    COOH*:
      composition: {C: 1, O: 2, H: 1}
      sites: 1
    CO*:
      composition: {C: 1, O: 1}
      sites: 1
    OH*:
      composition: {O: 1, H: 1}
      sites: 1

reactions:
  - label: CO2 adsorption
    equation: CO2 + * <=> CO2*
  - label: H2 dissociation
    equation: H2 + 2* <=> 2H*
  - label: COOH formation
    equation: CO2* + H* <=> COOH* + *
  - label: COOH cleavage
    equation: COOH* + * <=> CO* + OH*
  - label: water formation
    equation: OH* + H* <=> H2O + 2*
  - label: CO desorption
    equation: CO* <=> CO + *

notes:
  - "TODO: citation needed for each elementary step."
  - "TODO: replace placeholder mechanism with surface-specific Fe3O4 evidence."
